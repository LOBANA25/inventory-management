{%  extends 'base.html'%}
{%block head%}
<style>
    .con1
    {
        width:100%;
    height:500px;
    
    background-image: url("{{ url_for('static', filename='images/product.jpg') }}");
    background-repeat: no-repeat;
    background-size:cover;
        
    }
</style>
{%endblock%}
{%block content%}
<h1 class="head">PRODUCT</h1>
<div class="con1" ></div>
<div class="aev">
<div>
<a href="#add">ADD</a><br><br>
<form action="/product/add" method="POST">
<input type="text" name="id" id="id" placeholder="Product_ID"><br><br>
<input type="text" name="name" id="name" placeholder="Product_Name"><br><br>
<input type="text" name="qty" id="qty" placeholder="Product_quantity"><br><br>
<input type="submit" value="Add" class="btn">
<br><br>
</form></div>
<div>
<a href="">EDIT</a><br><br>
<form action="{{ url_for('update_product', id=id) }}" method="POST">
    <input type="text" name="qty" id="qty" placeholder="Product_Quantity"><br><br>
    <input type="submit" value="Update" class="btn"><br><br>
    <input type="submit" value="Delete" class="btn"><br><br>
    </form>
</div>
    <div>
<a href="">VIEW</a>
</div>
</div>
<br>
<table>
    <tr>
    <th>PRODUCT_ID</th>
    <th>PRODUCT_NAME</th>
    <th>PRODUCT-QUANTITY
    </th></tr>
    
        {%for product in products%}
        <tr>
        <td>{{product.product_id}}</td>
        <td>{{product.product_name}}</td>
        <td>{{product.qty}}</td>
    </tr>
        {% endfor%}
    
</table><br><br>
{%endblock%}
